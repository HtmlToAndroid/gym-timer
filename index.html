<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gym PT Timer</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0c;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .controls {
            position: absolute;
            top: 15px;
            display: flex;
            gap: 15px;
            z-index: 10;
        }
        button {
            background: #22252a;
            color: #aeaeae;
            border: 1px solid #444;
            padding: 15px 25px; /* Bigger tap targets for mobile */
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        button.active {
            background: #ff5e00;
            color: #fff;
            border-color: #ff5e00;
        }
        .timer-container {
            width: 100%;
            max-width: 850px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .time-display {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            font-family: monospace;
            font-weight: 700;
            font-size: 28vw; 
            line-height: 0.9;
        }
        .minutes {
            color: #00ff66;
            text-align: right;
            flex: 1;
            padding-right: 2vw;
        }
        .separator {
            color: #444;
        }
        .seconds {
            color: #00e1ff;
            text-align: left;
            flex: 1;
            padding-left: 2vw;
        }
        .pt-display {
            margin-top: 2vh;
            font-size: 8vw;
            font-weight: 800;
            color: #ffcc00;
            height: 10vw;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="controls">
        <button id="startBtn">START</button>
        <button id="resetBtn">RESET</button>
    </div>

    <div class="timer-container">
        <div class="time-display">
            <span id="mins" class="minutes">00</span>
            <span class="separator">:</span>
            <span id="secs" class="seconds">00</span>
        </div>
        <div id="ptCounter" class="pt-display"></div>
    </div>

    <script>
        // State variables using precise timing loops
        let isRunning = false;
        let startTime = 0;
        let elapsedBeforePause = 0;
        let lastRenderedSeconds = -1;

        const minsEl = document.getElementById('mins');
        const secsEl = document.getElementById('secs');
        const ptEl = document.getElementById('ptCounter');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');

        function updateDisplay(totalSeconds) {
            let minutes = Math.floor(totalSeconds / 60);
            if (minutes > 99) minutes = 99; 
            let seconds = totalSeconds % 60;

            // Only redraw the interface text if the actual second changed
            // This cuts mobile processing overhead to nearly zero
            if (seconds === lastRenderedSeconds) return;
            lastRenderedSeconds = seconds;

            minsEl.textContent = String(minutes).padStart(2, '0');
            secsEl.textContent = String(seconds).padStart(2, '0');

            if (seconds === 0 || (seconds >= 1 && seconds <= 9)) {
                ptEl.textContent = ""; 
            } else if (seconds >= 10 && seconds < 15) {
                ptEl.textContent = "1/60"; 
            } else if (seconds >= 15 && seconds < 20) {
                ptEl.textContent = "1/4"; 
            } else if (seconds >= 20 && seconds < 30) {
                ptEl.textContent = "1/3"; 
            } else if (seconds >= 30 && seconds < 45) {
                ptEl.textContent = "1/2"; 
            } else if (seconds >= 45 && seconds < 50) {
                ptEl.textContent = "3/4"; 
            } else if (seconds >= 50 && seconds <= 59) {
                ptEl.textContent = 60 - seconds;
            }
        }

        // The Engine: Continuously loops with the mobile display engine
        function tick(timestamp) {
            if (!isRunning) return;

            // Calculate exact elapsed seconds based on real-world time elapsed
            const totalElapsedMs = (timestamp - startTime) + elapsedBeforePause;
            const totalSeconds = Math.floor(totalElapsedMs / 1000);

            updateDisplay(totalSeconds);

            // Request next frame rendering pipeline natively
            requestAnimationFrame(tick);
        }

        function toggleTimer() {
            if (isRunning) {
                // Pause State
                isRunning = false;
                startBtn.textContent = "START";
                startBtn.classList.remove('active');
                // Save exactly how long it was running for
                elapsedBeforePause += (performance.now() - startTime);
            } else {
                // Start State
                isRunning = true;
                startBtn.textContent = "PAUSE";
                startBtn.classList.add('active');
                // Sync to current strict system uptime
                startTime = performance.now();
                requestAnimationFrame(tick);
            }
        }

        function resetTimer() {
            isRunning = false;
            startTime = 0;
            elapsedBeforePause = 0;
            lastRenderedSeconds = -1;
            startBtn.textContent = "START";
            startBtn.classList.remove('active');
            minsEl.textContent = "00";
            secsEl.textContent = "00";
            ptEl.textContent = "";
        }

        // Use direct event binding—Brave handles these cleanest locally
        startBtn.onclick = toggleTimer;
        resetBtn.onclick = resetTimer;
    </script>
</body>
</html>
