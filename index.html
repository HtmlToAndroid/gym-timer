<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gym PT Timer</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0c;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .controls {
            position: absolute;
            top: 15px;
            display: flex;
            gap: 20px; /* Increased gap between buttons */
            z-index: 10;
        }
        button {
            background: #22252a;
            color: #aeaeae;
            border: 1px solid #444;
            padding: 18px 28px; /* Fatter tap targets for easy hitting while running */
            border-radius: 8px;
            font-size: 16px; /* Slightly larger text for legibility */
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 1px;
        }
        button.active {
            background: #ff5e00;
            color: #fff;
            border-color: #ff5e00;
        }
        .timer-container {
            width: 100%;
            max-width: 850px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .time-display {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            font-family: monospace;
            font-weight: 700;
            font-size: 28vw; 
            line-height: 0.9;
        }
        .minutes {
            color: #00ff66;
            text-align: right;
            flex: 1;
            padding-right: 2vw;
        }
        .separator {
            color: #444;
            animation: blink 1s step-start infinite;
        }
        .seconds {
            color: #00e1ff;
            text-align: left;
            flex: 1;
            padding-left: 2vw;
        }
        .pt-display {
            margin-top: 3vh;
            font-size: 8vw;
            font-weight: 800;
            color: #ffcc00;
            width: 80vw; /* Fixed width container to hold the background color nicely */
            height: 12vw;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 12px;
            background-color: #000000; /* Default background */
            transition: background-color 0.3s ease; /* Smooth visual transition between colors */
        }
        @keyframes blink {
            50% { opacity: 0.2; }
        }
    </style>
</head>
<body>

    <div class="controls">
        <button id="startBtn">START</button>
        <button id="resetBtn">RESET</button>
        <button id="fullscreenBtn">FULLSCREEN</button>
    </div>

    <div class="timer-container">
        <div class="time-display">
            <span id="mins" class="minutes">00</span>
            <span class="separator">:</span>
            <span id="secs" class="seconds">00</span>
        </div>
        <div id="ptCounter" class="pt-display"></div>
    </div>

    <script>
        let isRunning = false;
        let startTime = 0;
        let elapsedBeforePause = 0;
        let lastRenderedSeconds = -1;
        let wakeLock = null;

        const minsEl = document.getElementById('mins');
        const secsEl = document.getElementById('secs');
        const ptEl = document.getElementById('ptCounter');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        function updateDisplay(totalSeconds) {
            let minutes = Math.floor(totalSeconds / 60);
            if (minutes > 99) minutes = 99; 
            let seconds = totalSeconds % 60;

            if (seconds === lastRenderedSeconds) return;
            lastRenderedSeconds = seconds;

            minsEl.textContent = String(minutes).padStart(2, '0');
            secsEl.textContent = String(seconds).padStart(2, '0');

            // Handle text changes and dynamic background color changes based on milestones
            if (seconds >= 0 && seconds <= 9) {
                ptEl.textContent = ""; 
                ptEl.style.backgroundColor = "#000000"; // Pure black background
                ptEl.style.color = "#ffcc00";
            } else if (seconds >= 10 && seconds < 15) {
                ptEl.textContent = "1/6"; 
                ptEl.style.backgroundColor = "#1a1c23"; // Deep dark blue-grey
                ptEl.style.color = "#ffcc00";
            } else if (seconds >= 15 && seconds < 20) {
                ptEl.textContent = "1/4"; 
                ptEl.style.backgroundColor = "#16241d"; // Deep forest green tint
                ptEl.style.color = "#ffcc00";
            } else if (seconds >= 20 && seconds < 30) {
                ptEl.textContent = "1/3"; 
                ptEl.style.backgroundColor = "#242016"; // Deep amber/brown tint
                ptEl.style.color = "#ffcc00";
            } else if (seconds >= 30 && seconds < 45) {
                ptEl.textContent = "1/2"; 
                ptEl.style.backgroundColor = "#26162b"; // Deep purple tint
                ptEl.style.color = "#ffcc00";
            } else if (seconds >= 45 && seconds < 50) {
                ptEl.textContent = "3/4"; 
                ptEl.style.backgroundColor = "#16282b"; // Deep teal tint
                ptEl.style.color = "#ffcc00";
            } else if (seconds >= 50 && seconds <= 59) {
                ptEl.textContent = 60 - seconds;
                ptEl.style.backgroundColor = "#360f0f"; // Critical warning deep red
                ptEl.style.color = "#ff3333"; // Switch text color to hot red for intensity
            }
        }

        function tick(timestamp) {
            if (!isRunning) return;

            const totalElapsedMs = (timestamp - startTime) + elapsedBeforePause;
            updateDisplay(Math.floor(totalElapsedMs / 1000));

            requestAnimationFrame(tick);
        }

        // --- WakeLock Safety Handlers ---
        async function requestWakeLock() {
            if ('wakeLock' in navigator) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                } catch (err) {
                    console.log(`WakeLock request failed: ${err.message}`);
                }
            }
        }

        async function releaseWakeLock() {
            if (wakeLock !== null) {
                try {
                    await wakeLock.release();
                    wakeLock = null;
                } catch (err) {
                    console.log(`WakeLock release failed: ${err.message}`);
                }
            }
        }

        async function toggleTimer() {
            if (isRunning) {
                isRunning = false;
                startBtn.textContent = "START";
                startBtn.classList.remove('active');
                elapsedBeforePause += (performance.now() - startTime);
                await releaseWakeLock();
            } else {
                isRunning = true;
                startBtn.textContent = "PAUSE";
                startBtn.classList.add('active');
                startTime = performance.now();
                requestAnimationFrame(tick);
                await requestWakeLock(); 
            }
        }

        async function resetTimer() {
            isRunning = false;
            startTime = 0;
            elapsedBeforePause = 0;
            lastRenderedSeconds = -1;
            startBtn.textContent = "START";
            startBtn.classList.remove('active');
            minsEl.textContent = "00";
            secsEl.textContent = "00";
            ptEl.textContent = "";
            ptEl.style.backgroundColor = "#000000";
            await releaseWakeLock();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Fullscreen blocked: ${err.message}`);
                });
                fullscreenBtn.textContent = "EXIT SCREEN";
            } else {
                document.exitFullscreen();
                fullscreenBtn.textContent = "FULLSCREEN";
            }
        }

        document.addEventListener('visibilitychange', async () => {
            if (wakeLock !== null && document.visibilityState === 'visible') {
                await requestWakeLock();
            }
        });

        startBtn.onclick = toggleTimer;
        resetBtn.onclick = resetTimer;
        fullscreenBtn.onclick = toggleFullscreen;

        updateDisplay(0);
    </script>
</body>
</html>
